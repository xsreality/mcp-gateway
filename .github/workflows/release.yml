name: Release

# Publishes to npm when a GitHub release is published. Flow per version:
#   bump version -> push to main -> create a GitHub release tagged vX.Y.Z.
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "Release tag '$GITHUB_REF_NAME' does not match package.json version '$PKG'" >&2
            exit 1
          fi

      - name: Type-check
        run: npm run typecheck

      - name: "Test (vitest: unit + e2e relay/OAuth)"
        run: npm test

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
